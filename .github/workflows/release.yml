name: Build & Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build Android APK & Publish GitHub Release
    runs-on: ubuntu-latest

    # write access is required to push the version-bump commit and create tags
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history + tags needed for conventional-commit version bumping
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      # Reads commits since the last vX.Y.Z tag and determines the bump level:
      #   BREAKING CHANGE / feat!:  → major
      #   feat:                     → minor
      #   everything else           → patch
      # Writes the new version back into app.json and emits it to $GITHUB_OUTPUT.
      - name: Bump version (conventional commits)
        id: bump
        run: node scripts/bump-version.mjs

      # expo prebuild generates android/ from the Expo config.
      # VERSION_CODE is the Actions run number — strictly increasing regardless
      # of semantic version math, so sideloaded upgrades always work.
      - name: Generate native Android project (Expo prebuild)
        run: VERSION_CODE=${{ github.run_number }} npx expo prebuild --platform android --clean --no-install

      # Gradle needs to know where the Android SDK lives on this runner.
      - name: Point Gradle at Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # Decode the base64-encoded keystore stored in GitHub Secrets.
      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # Append a signing config block to the generated build.gradle.
      # Gradle allows reopening android {} — the config is merged with the
      # existing block produced by expo prebuild.
      - name: Inject release signing config
        run: |
          cat >> android/app/build.gradle << 'GROOVY'

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_FILE"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GROOVY

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # Commit the bumped app.json back to main AFTER a successful build so
      # failed builds never pollute the version history.
      # [skip ci] stops GitHub Actions from re-triggering on this commit.
      - name: Commit version bump
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      # gh CLI is pre-installed on all GitHub-hosted runners.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          gh release create "v${VERSION}" \
            --title "Loan Killer v${VERSION}" \
            --notes "Automated release from commit \`${{ github.sha }}\` on \`main\`." \
            "$APK#loan-killer.apk"
