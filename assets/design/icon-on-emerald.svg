<svg width="1024" height="1024" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!--
    Loan Killer — app icon (opaque, iOS-safe)
    White ₱ glyph on emerald gradient background
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <mask id="peso-wht">
      <!-- P body -->
      <path d="M 20,12 L 35,12 C 98,12 98,54 35,54 L 35,88 L 20,88 Z" fill="white"/>
      <!-- Bar cutouts — emerald background shows through = double-bar effect -->
      <rect x="12" y="28" width="72" height="7" rx="1" fill="black"/>
      <rect x="12" y="39" width="72" height="7" rx="1" fill="black"/>
    </mask>
  </defs>

  <!-- Emerald gradient background (no alpha — iOS requires opaque icon) -->
  <rect width="100" height="100" fill="url(#bg)"/>

  <!-- White ₱ glyph -->
  <rect width="100" height="100" fill="white" mask="url(#peso-wht)"/>

  <!-- Red slash -->
  <line x1="14" y1="87" x2="86" y2="13"
        stroke="#dc2626" stroke-width="9" stroke-linecap="round"/>
</svg>
